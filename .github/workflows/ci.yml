name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: ✅ Lint, Typecheck and Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧹 Lint
        run: bun run lint

      - name: 🔎 Typecheck
        run: bunx tsc --noEmit

      - name: 🏗️ Build
        run: bun run build
